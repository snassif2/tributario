<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validador Tributário NF-e / NFS-e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e8eaf0; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #242736; border-radius: 3px; }
    @media print {
      .no-print { display: none !important; }
      body { background: white; color: black; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const DEFAULT_API_ENDPOINT  = "https://0s9jx2p8ae.execute-api.us-east-1.amazonaws.com/prod/analyze";
    const COGNITO_CLIENT_ID     = "1bk4k255hv4kt8rrt895j93fke";
    const COGNITO_DOMAIN        = "tributario-983119018116.auth.us-east-1.amazoncognito.com";
    const COGNITO_REDIRECT_URI  = "https://d17dpl2yhq6kg9.cloudfront.net";
    const AUTH_ENABLED          = COGNITO_CLIENT_ID !== "REPLACE_COGNITO_CLIENT_ID";

    // ─── AUTH HELPERS ─────────────────────────────────────────────────────────
    function authLoginUrl() {
      return `https://${COGNITO_DOMAIN}/login?` + new URLSearchParams({
        response_type: 'code', client_id: COGNITO_CLIENT_ID,
        redirect_uri: COGNITO_REDIRECT_URI, scope: 'openid email profile',
      });
    }
    function authLogoutUrl() {
      return `https://${COGNITO_DOMAIN}/logout?` + new URLSearchParams({
        client_id: COGNITO_CLIENT_ID, logout_uri: COGNITO_REDIRECT_URI,
      });
    }
    function authParseJwt(token) {
      try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
      catch { return null; }
    }
    function authIsValid(token) {
      if (!token) return false;
      const p = authParseJwt(token);
      return !!(p && p.exp * 1000 > Date.now() + 30000);
    }
    function authGetToken()  { return localStorage.getItem('trib_id_token'); }
    function authGetUser()   {
      const t = authGetToken();
      return authIsValid(t) ? authParseJwt(t) : null;
    }
    function authStore(tokens) {
      localStorage.setItem('trib_id_token', tokens.id_token);
      if (tokens.refresh_token) localStorage.setItem('trib_refresh_token', tokens.refresh_token);
    }
    function authClear() {
      localStorage.removeItem('trib_id_token');
      localStorage.removeItem('trib_refresh_token');
    }
    async function authExchangeCode(code) {
      const res = await fetch(`https://${COGNITO_DOMAIN}/oauth2/token`, {
        method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({ grant_type:'authorization_code', client_id:COGNITO_CLIENT_ID,
          redirect_uri:COGNITO_REDIRECT_URI, code }).toString(),
      });
      return res.json();
    }
    async function authRefreshTokens() {
      const rt = localStorage.getItem('trib_refresh_token');
      if (!rt) return false;
      try {
        const res = await fetch(`https://${COGNITO_DOMAIN}/oauth2/token`, {
          method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
          body: new URLSearchParams({ grant_type:'refresh_token', client_id:COGNITO_CLIENT_ID,
            refresh_token:rt }).toString(),
        });
        const tokens = await res.json();
        if (tokens.id_token) { authStore(tokens); return true; }
        return false;
      } catch { return false; }
    }
    // Authenticated fetch — attaches Bearer token to API calls
    function apiFetch(url, options = {}) {
      const token = authGetToken();
      const headers = { ...(options.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return fetch(url, { ...options, headers });
    }

    // ─── COLOURS ──────────────────────────────────────────────────────────────
    const C = {
      bg: '#0f1117', surface: '#1a1d27', surface2: '#242736', surface3: '#2e3146',
      green: '#00c896', amber: '#f59e0b', red: '#ef4444', blue: '#3b82f6',
      text: '#e8eaf0', text2: '#8b90a4',
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // MODULE 1 — XML PARSER (browser, pure JS)
    // ═══════════════════════════════════════════════════════════════════════════
    function getTextByTag(node, tag) {
      const el = node.getElementsByTagName(tag)[0];
      return el ? el.textContent.trim() : null;
    }
    function pf(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

    function detectTipo(xmlDoc) {
      const root = xmlDoc.documentElement;
      const tag = root.tagName || '';
      const ns  = root.namespaceURI || '';
      if (tag.includes('nfeProc') || tag.includes('NFe') || ns.includes('nfe.fazenda') || ns.includes('portalfiscal.inf.br/nfe')) return 'NFe';
      if (tag.includes('CompNfse') || tag.includes('NfseProc') || ns.includes('nfse') || ns.includes('abrasf')) return 'NFSe';
      if (xmlDoc.getElementsByTagName('infNFe').length > 0) return 'NFe';
      if (xmlDoc.getElementsByTagName('InfNfse').length > 0 || xmlDoc.getElementsByTagName('Nfse').length > 0) return 'NFSe';
      return 'desconhecido';
    }

    function parseNFe(xmlDoc, fileName) {
      const infNFe = xmlDoc.getElementsByTagName('infNFe')[0];
      const chave  = infNFe ? (infNFe.getAttribute('Id') || '').replace('NFe','') : getTextByTag(xmlDoc,'chNFe');
      const ide    = xmlDoc.getElementsByTagName('ide')[0]  || xmlDoc;
      const emit   = xmlDoc.getElementsByTagName('emit')[0] || xmlDoc;
      const dest   = xmlDoc.getElementsByTagName('dest')[0] || xmlDoc;
      const crt    = getTextByTag(emit,'CRT') || '3';
      const regs   = {'1':'Simples Nacional','2':'Simples Nacional — Excesso','3':'Lucro Presumido / Real'};
      const dhEmi  = getTextByTag(ide,'dhEmi') || getTextByTag(ide,'dEmi') || '';
      const ano    = dhEmi ? parseInt(dhEmi.substring(0,4)) : new Date().getFullYear();

      const detNodes = xmlDoc.getElementsByTagName('det');
      const itens = [];
      for (let i = 0; i < detNodes.length; i++) {
        const det = detNodes[i];
        const prod    = det.getElementsByTagName('prod')[0]    || det;
        const imposto = det.getElementsByTagName('imposto')[0] || det;
        const icms = imposto.getElementsByTagName('ICMS')[0];
        const pis  = imposto.getElementsByTagName('PIS')[0];
        const cof  = imposto.getElementsByTagName('COFINS')[0];
        const ipi  = imposto.getElementsByTagName('IPI')[0];
        const ibscbs = imposto.getElementsByTagName('IBSCBS')[0];

        let ibsD = { valor: null, aliquota: null };
        let cbsD = { valor: null, aliquota: null };
        let cstIbs = null, cClass = null;
        if (ibscbs) {
          cstIbs = getTextByTag(ibscbs,'CST');
          cClass = getTextByTag(ibscbs,'cClassTrib');
          const g = ibscbs.getElementsByTagName('gIBSCBS')[0];
          if (g) {
            const guf = g.getElementsByTagName('gIBSUF')[0];
            const gmun = g.getElementsByTagName('gIBSMun')[0];
            const gcbs = g.getElementsByTagName('gCBS')[0];
            ibsD = { valor: pf(getTextByTag(guf,'vIBSUF')) + pf(getTextByTag(gmun,'vIBSMun')), aliquota: pf(getTextByTag(guf,'pIBSUF'))/100 + pf(getTextByTag(gmun,'pIBSMun'))/100 };
            if (gcbs) cbsD = { valor: pf(getTextByTag(gcbs,'vCBS')), aliquota: pf(getTextByTag(gcbs,'pCBS'))/100 };
          }
        }

        itens.push({
          numero: parseInt(det.getAttribute('nItem') || String(i+1)),
          codigo: getTextByTag(prod,'cProd') || '',
          descricao: getTextByTag(prod,'xProd') || '',
          ncm: getTextByTag(prod,'NCM') || '',
          nbs: null, cfop: getTextByTag(prod,'CFOP') || '',
          quantidade: pf(getTextByTag(prod,'qCom')),
          valor_unitario: pf(getTextByTag(prod,'vUnCom')),
          valor_total: pf(getTextByTag(prod,'vProd')),
          desconto: pf(getTextByTag(prod,'vDesc')),
          tributos_declarados: {
            icms:   { valor: icms ? pf(getTextByTag(icms,'vICMS')) : 0,   aliquota: icms ? pf(getTextByTag(icms,'pICMS'))/100 : 0, cst: icms ? (getTextByTag(icms,'CST') || getTextByTag(icms,'CSOSN') || '') : '' },
            pis:    { valor: pis  ? pf(getTextByTag(pis,'vPIS'))    : 0,  aliquota: pis  ? pf(getTextByTag(pis,'pPIS'))/100  : 0 },
            cofins: { valor: cof  ? pf(getTextByTag(cof,'vCOFINS')) : 0,  aliquota: cof  ? pf(getTextByTag(cof,'pCOFINS'))/100 : 0 },
            ipi:    { valor: ipi  ? pf(getTextByTag(ipi,'vIPI'))    : 0,  aliquota: ipi  ? pf(getTextByTag(ipi,'pIPI'))/100  : 0 },
            iss:    { valor: 0, aliquota: 0 },
            ibs: ibsD, cbs: cbsD,
          },
          cst_ibs_cbs: cstIbs, cclasstrib: cClass,
        });
      }

      const total = xmlDoc.getElementsByTagName('ICMSTot')[0];
      return {
        tipo: 'NFe',
        cenario: itens.some(it => it.tributos_declarados.ibs.valor !== null) ? 'A' : 'B',
        chave_acesso: chave,
        emitente: { cnpj: getTextByTag(emit,'CNPJ') || '', nome: getTextByTag(emit,'xNome') || '', crt, regime: regs[crt] || '', uf: getTextByTag(emit.getElementsByTagName('enderEmit')[0] || emit,'UF') || '' },
        destinatario: { cnpj_cpf: getTextByTag(dest,'CNPJ') || getTextByTag(dest,'CPF') || '', tipo: getTextByTag(dest,'CNPJ') ? 'PJ' : 'PF', contribuinte: (getTextByTag(dest,'indIEDest') || '9') === '1' },
        data_emissao: dhEmi.substring(0,10),
        ano_emissao: ano,
        natureza_operacao: getTextByTag(ide,'natOp') || '',
        valor_total_nota: total ? pf(getTextByTag(total,'vNF')) : itens.reduce((s,i) => s + i.valor_total, 0),
        itens,
        erros_parse: itens.length === 0 ? ['Nenhum item encontrado'] : [],
        arquivo_original: fileName,
        _source: 'xml',
      };
    }

    function parseNFSe(xmlDoc, fileName) {
      const prestador = xmlDoc.getElementsByTagName('Prestador')[0] || xmlDoc;
      const servico   = xmlDoc.getElementsByTagName('Servico')[0]   || xmlDoc;
      const valores   = servico.getElementsByTagName('Valores')[0]  || xmlDoc;
      const dhEmi     = getTextByTag(xmlDoc,'DataEmissao') || getTextByTag(xmlDoc,'Competencia') || '';
      const ano       = dhEmi ? parseInt(dhEmi.substring(0,4)) : new Date().getFullYear();
      const valServ   = pf(getTextByTag(valores,'ValorServicos'));
      return {
        tipo: 'NFSe', cenario: 'B',
        chave_acesso: getTextByTag(xmlDoc,'CodigoVerificacao') || getTextByTag(xmlDoc,'Numero') || null,
        emitente: { cnpj: getTextByTag(prestador.getElementsByTagName('IdentificacaoPrestador')[0] || prestador,'Cnpj') || '', nome: getTextByTag(prestador,'NomeRazaoSocial') || '', crt: '3', regime: 'Não informado', uf: '' },
        destinatario: { cnpj_cpf: '', tipo: 'PJ', contribuinte: true },
        data_emissao: dhEmi.substring(0,10), ano_emissao: ano,
        natureza_operacao: 'Prestação de Serviço',
        valor_total_nota: valServ,
        itens: [{
          numero: 1, codigo: getTextByTag(servico,'CodigoTributacaoMunicipio') || '',
          descricao: getTextByTag(servico,'Discriminacao') || 'Serviço',
          ncm: '', nbs: getTextByTag(servico,'CodigoNbs') || null, cfop: '',
          quantidade: 1, valor_unitario: valServ, valor_total: valServ, desconto: 0,
          tributos_declarados: {
            icms: {valor:0,aliquota:0,cst:''}, pis: {valor:0,aliquota:0}, cofins: {valor:0,aliquota:0},
            ipi: {valor:0,aliquota:0}, iss: {valor:pf(getTextByTag(valores,'ValorIss')), aliquota:pf(getTextByTag(valores,'Aliquota'))/100},
            ibs: {valor:null,aliquota:null}, cbs: {valor:null,aliquota:null},
          },
          cst_ibs_cbs: null, cclasstrib: null,
        }],
        erros_parse: [], arquivo_original: fileName, _source: 'xml',
      };
    }

    function parseXML(text, fileName) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(text, 'text/xml');
      if (xmlDoc.querySelector('parsererror')) throw new Error('XML malformado');
      const tipo = detectTipo(xmlDoc);
      if (tipo === 'NFe')  return parseNFe(xmlDoc, fileName);
      if (tipo === 'NFSe') return parseNFSe(xmlDoc, fileName);
      throw new Error('Documento não reconhecido como NF-e ou NFS-e');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // MODULE 2 — TAX CALCULATION ENGINE
    // ═══════════════════════════════════════════════════════════════════════════
    const ALIQ = {
      2026: { cbs:0.009,  ibs_uf:0.001,  ibs_mun:0.000 },
      2027: { cbs:0.088,  ibs_uf:0.025,  ibs_mun:0.025 },
      2028: { cbs:0.088,  ibs_uf:0.025,  ibs_mun:0.025 },
      2029: { cbs:0.088,  ibs_uf:0.089,  ibs_mun:0.088 },
      2030: { cbs:0.088,  ibs_uf:0.089,  ibs_mun:0.088 },
      2031: { cbs:0.088,  ibs_uf:0.089,  ibs_mun:0.088 },
      2032: { cbs:0.088,  ibs_uf:0.089,  ibs_mun:0.088 },
      2033: { cbs:0.088,  ibs_uf:0.089,  ibs_mun:0.088 },
    };
    // Tax data — loaded from S3 JSON files, fallback to minimal defaults while loading
    let TAX_DATA = {
      cestaBasica:  { ncms: [{prefixo:'1006'},{prefixo:'0713'},{prefixo:'0201'},{prefixo:'0202'},{prefixo:'0203'},{prefixo:'0207'},{prefixo:'0401'},{prefixo:'1905'}] },
      reducoesProd: { grupos: [
        { id:'saude', fator:0.40, ncm_prefixos:['3001','3002','3003','3004','3005','3006'], nbs_prefixos:[] },
        { id:'servicos_liberais', fator:0.70, ncm_prefixos:[], nbs_prefixos:['01040'] },
      ]},
      reducoesServ: { grupos: [] },
      impostoSel:   { produtos: [
        { categoria:'tabaco',     ncm_prefixos:['2402','2403'], aliquota_is:0.20 },
        { categoria:'alcoolicas', ncm_prefixos:['2203'],        aliquota_is:0.10 },
        { categoria:'refrig',     ncm_prefixos:['2202'],        aliquota_is:0.08 },
        { categoria:'mineracao',  ncm_prefixos:['2601'],        aliquota_is:0.04 },
      ]},
      loaded: false,
    };

    async function loadTaxData() {
      try {
        const [cb, rp, rs, is_] = await Promise.all([
          fetch('./data/cesta_basica.json').then(r => r.json()),
          fetch('./data/reducoes_produto.json').then(r => r.json()),
          fetch('./data/reducoes_servico.json').then(r => r.json()),
          fetch('./data/imposto_seletivo.json').then(r => r.json()),
        ]);
        TAX_DATA = { cestaBasica: cb, reducoesProd: rp, reducoesServ: rs, impostoSel: is_, loaded: true };
      } catch(e) {
        console.warn('Tax data files not found, using built-in defaults:', e.message);
      }
    }

    function r2(v) { return Math.round(v * 100) / 100; }

    function getFator(ncm, nbs) {
      if (!ncm && !nbs) return 1;
      // Cesta básica — zero rate
      for (const item of (TAX_DATA.cestaBasica?.ncms || []))
        if (ncm && ncm.startsWith(item.prefixo)) return 0;
      // Reduced-rate products
      for (const g of (TAX_DATA.reducoesProd?.grupos || []))
        for (const p of (g.ncm_prefixos || []))
          if (ncm && ncm.startsWith(p)) return g.fator;
      // Reduced-rate services (NBS)
      for (const g of [...(TAX_DATA.reducoesServ?.grupos || []), ...(TAX_DATA.reducoesProd?.grupos || [])])
        for (const p of (g.nbs_prefixos || []))
          if (nbs && nbs.startsWith(p)) return g.fator;
      return 1;
    }
    function getSetor(ncm, nbs) {
      if (!ncm && !nbs) return 'Geral';
      for (const item of (TAX_DATA.cestaBasica?.ncms || []))
        if (ncm && ncm.startsWith(item.prefixo)) return 'Cesta Básica';
      for (const g of (TAX_DATA.reducoesProd?.grupos || [])) {
        for (const p of (g.ncm_prefixos || []))
          if (ncm && ncm.startsWith(p)) return g.descricao?.split(':')[0] || g.id;
        for (const p of (g.nbs_prefixos || []))
          if (nbs && nbs.startsWith(p)) return g.descricao?.split(':')[0] || g.id;
      }
      for (const g of (TAX_DATA.reducoesServ?.grupos || []))
        for (const p of (g.nbs_prefixos || []))
          if (nbs && nbs.startsWith(p)) return g.descricao?.split(':')[0] || g.id;
      return 'Geral';
    }
    function getIS(ncm, base) {
      if (!ncm) return 0;
      for (const prod of (TAX_DATA.impostoSel?.produtos || []))
        for (const p of (prod.ncm_prefixos || []))
          if (ncm.startsWith(p)) return r2(base * prod.aliquota_is);
      return 0;
    }
    function calcItem(item, ano) {
      const aliq  = ALIQ[ano] || ALIQ[2026];
      const base  = item.valor_total - (item.desconto || 0);
      const fator = getFator(item.ncm, item.nbs);
      const cbs   = base * aliq.cbs     * fator;
      const ibsUF = base * aliq.ibs_uf  * fator;
      const ibsMun= base * aliq.ibs_mun * fator;
      const ibs   = ibsUF + ibsMun;
      const is    = getIS(item.ncm, base);
      return { base, fator, cbs:r2(cbs), ibs_uf:r2(ibsUF), ibs_mun:r2(ibsMun), ibs_total:r2(ibs),
               is:r2(is), total_novo:r2(cbs+ibs+is), credito_cbs:r2(cbs), credito_ibs:r2(ibs), setor:getSetor(item.ncm,item.nbs) };
    }
    function calcSplit(ibs, cbs, vNota) {
      const ret = ibs + cbs;
      return { valor_retido:r2(ret), valor_liquido:r2(vNota-ret), percentual: vNota>0 ? r2((ret/vNota)*100) : 0 };
    }
    function calcComp(dec, novo, vNota) {
      const atual = r2((dec.icms?.valor||0)+(dec.pis?.valor||0)+(dec.cofins?.valor||0)+(dec.ipi?.valor||0)+(dec.iss?.valor||0));
      const delta = r2(novo - atual);
      return { atual, novo:r2(novo), delta, delta_pct: atual>0 ? r2((delta/atual)*100) : null,
               tendencia: delta<0?'reducao':delta>0?'aumento':'neutro',
               atual_pct: vNota>0 ? r2((atual/vNota)*100) : 0,
               novo_pct:  vNota>0 ? r2((novo/vNota)*100) : 0 };
    }
    function gerarAlertas(nota, calc) {
      const al = [];
      if (nota.cenario==='B') al.push({tipo:'simulacao',msg:'Grupo IBS/CBS ausente — valores projetados'});
      nota.itens.forEach((item, i) => {
        const c = calc[i];
        if (!item.ncm && nota.tipo==='NFe') al.push({tipo:'atencao',msg:`Item ${item.numero}: NCM não informado`});
        if (c?.is > 0) al.push({tipo:'atencao',msg:`Item ${item.numero}: Imposto Seletivo (NCM ${item.ncm})`});
        if (c?.fator===0) al.push({tipo:'info',msg:`Item ${item.numero}: Cesta básica — alíquota zero`});
        else if (c?.fator < 1) al.push({tipo:'info',msg:`Item ${item.numero}: Redução ${Math.round((1-c.fator)*100)}% (${c.setor})`});
      });
      return al.slice(0,6);
    }
    function processarNota(nota) {
      const calc = nota.itens.map(it => calcItem(it, nota.ano_emissao));
      const totCBS = r2(calc.reduce((s,c)=>s+c.cbs,0));
      const totIBS = r2(calc.reduce((s,c)=>s+c.ibs_total,0));
      const totIS  = r2(calc.reduce((s,c)=>s+c.is,0));
      const totNovo= r2(totCBS+totIBS+totIS);
      const decTot = { icms:{valor:nota.itens.reduce((s,i)=>s+i.tributos_declarados.icms.valor,0)}, pis:{valor:nota.itens.reduce((s,i)=>s+i.tributos_declarados.pis.valor,0)}, cofins:{valor:nota.itens.reduce((s,i)=>s+i.tributos_declarados.cofins.valor,0)}, ipi:{valor:nota.itens.reduce((s,i)=>s+i.tributos_declarados.ipi.valor,0)}, iss:{valor:nota.itens.reduce((s,i)=>s+i.tributos_declarados.iss.valor,0)} };
      return { nota, itens_calc:calc, totais:{ cbs:totCBS, ibs:totIBS, is:totIS, novo:totNovo, credito_cbs:r2(calc.reduce((s,c)=>s+c.credito_cbs,0)), credito_ibs:r2(calc.reduce((s,c)=>s+c.credito_ibs,0)) }, tributos_dec_totais:decTot, comparativo:calcComp(decTot,totNovo,nota.valor_total_nota), split:calcSplit(totIBS,totCBS,nota.valor_total_nota), alertas:gerarAlertas(nota,calc) };
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // MODULE 3 — API CALLS
    // ═══════════════════════════════════════════════════════════════════════════
    async function extractPDF(base64, filename, endpoint) {
      const extractUrl = endpoint.replace('/analyze','/extract');
      const res = await apiFetch(extractUrl, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pdf_base64: base64, filename }),
      });
      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try { const d = await res.json(); detail += ': ' + (d.error?.message || d.error || JSON.stringify(d)); } catch {}
        throw new Error(detail);
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.nota;
    }

    // ── CNPJ Lookup (BrasilAPI — Receita Federal, free, no key) ─────────────────
    const _cnpjCache = {};
    async function lookupCNPJ(cnpj) {
      if (!cnpj) return null;
      const raw = cnpj.replace(/\D/g, '');
      if (raw.length !== 14) return null;
      if (_cnpjCache[raw]) return _cnpjCache[raw];
      try {
        const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${raw}`);
        if (!res.ok) return null;
        const d = await res.json();
        const result = {
          razao_social:       d.razao_social || '',
          porte:              d.porte || '',                          // ME, EPP, DEMAIS
          simples:            d.opcao_pelo_simples === true,
          mei:                d.opcao_pelo_mei === true,
          cnae_codigo:        String(d.cnae_fiscal || ''),
          cnae_descricao:     d.cnae_fiscal_descricao || '',
          situacao:           d.descricao_situacao_cadastral || '',
          regime_confirmado:  d.opcao_pelo_mei === true ? 'MEI' :
                              d.opcao_pelo_simples === true ? 'Simples Nacional' :
                              d.porte === 'DEMAIS' ? 'Lucro Presumido ou Lucro Real' :
                              'Lucro Presumido',
          crt_confirmado:     (d.opcao_pelo_simples === true || d.opcao_pelo_mei === true) ? '1' : '3',
        };
        _cnpjCache[raw] = result;
        return result;
      } catch { return null; }
    }

    async function enriquecerNota(nota) {
      const cnpjData = await lookupCNPJ(nota.emitente?.cnpj);
      if (!cnpjData) return nota;
      return {
        ...nota,
        emitente: {
          ...nota.emitente,
          regime:  cnpjData.regime_confirmado,
          crt:     cnpjData.crt_confirmado,
          porte:   cnpjData.porte,
          cnae_codigo:    cnpjData.cnae_codigo,
          cnae_descricao: cnpjData.cnae_descricao,
          situacao_rf:    cnpjData.situacao,
          simples:        cnpjData.simples,
          mei:            cnpjData.mei,
        },
      };
    }

    async function chamarClaudeAPI(resultados, endpoint) {
      const resumo = resultados.map(r => ({
        chave: r.nota.chave_acesso, tipo: r.nota.tipo, emitente: r.nota.emitente.nome,
        cnpj: r.nota.emitente.cnpj,
        regime: r.nota.emitente.regime,
        porte: r.nota.emitente.porte || '',
        simples: r.nota.emitente.simples || false,
        mei: r.nota.emitente.mei || false,
        cnae: r.nota.emitente.cnae_codigo ? `${r.nota.emitente.cnae_codigo} — ${r.nota.emitente.cnae_descricao}` : '',
        situacao_rf: r.nota.emitente.situacao_rf || '',
        valor_nota: r.nota.valor_total_nota,
        carga_atual: r.comparativo.atual, carga_nova: r.comparativo.novo,
        delta_pct: r.comparativo.delta_pct,
        ncms: [...new Set(r.nota.itens.map(i=>i.ncm).filter(Boolean))],
        cenario: r.nota.cenario,
      }));
      const prompt = `Você é um especialista tributário brasileiro especializado na Reforma Tributária de 2026 (LC 214/2025).
Analise o lote de notas fiscais e retorne APENAS JSON com esta estrutura exata:
{"analise_por_nota":[{"chave_acesso":"string","setor_confirmado":"string","tratamento_especial":"nenhum|cesta_basica|imposto_seletivo|saude|educacao|zmf|outro","alertas":[{"tipo":"erro|atencao|info","mensagem":"string"}],"observacao_ncm":"string ou null"}],"resumo_executivo":"string (máx 150 palavras)","recomendacoes":[{"prioridade":"alta|media|baixa","texto":"string"}]}

Os dados incluem regime tributário confirmado via Receita Federal (campo regime), porte da empresa, CNAE principal e situação cadastral.
Use essas informações para uma análise mais precisa do impacto da reforma.

DADOS: ${JSON.stringify(resumo)}`;
      const res = await apiFetch(endpoint, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2000, messages:[{role:'user',content:prompt}] }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const clean = data.content[0].text.replace(/```json|```/g,'').trim();
      return JSON.parse(clean);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // CSV EXPORT
    // ═══════════════════════════════════════════════════════════════════════════
    function exportCSV(resultados) {
      const hdr = 'chave_acesso;tipo_doc;emitente_cnpj;emitente_nome;regime;data_emissao;item_nr;item_desc;ncm_nbs;valor_item;icms;pis;cofins;iss;total_atual;cbs_novo;ibs_novo;is_novo;total_novo;delta_abs;delta_pct;credito_cbs;credito_ibs;split_retido;cenario;fonte;alertas';
      const rows = [];
      for (const r of resultados) {
        r.nota.itens.forEach((item, idx) => {
          const c = r.itens_calc[idx];
          rows.push([
            r.nota.chave_acesso||'', r.nota.tipo, r.nota.emitente.cnpj, `"${r.nota.emitente.nome}"`,
            r.nota.emitente.regime, r.nota.data_emissao, item.numero, `"${item.descricao}"`,
            item.ncm||item.nbs||'', item.valor_total,
            item.tributos_declarados.icms.valor, item.tributos_declarados.pis.valor,
            item.tributos_declarados.cofins.valor, item.tributos_declarados.iss.valor,
            r.comparativo.atual, c.cbs, c.ibs_total, c.is, c.total_novo,
            r.comparativo.delta, r.comparativo.delta_pct??'',
            c.credito_cbs, c.credito_ibs, r.split.valor_retido,
            r.nota.cenario, r.nota._source||'xml',
            `"${r.alertas.map(a=>a.msg).join(' | ')}"`,
          ].join(';'));
        });
      }
      const csv = [hdr,...rows].join('\n');
      const url = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
      const a = document.createElement('a'); a.href=url; a.download=`tributario_${new Date().toISOString().substring(0,10)}.csv`; a.click();
      URL.revokeObjectURL(url);
    }

    // FILE UPLOAD BOX — one per file type (XML or PDF)
    // ═══════════════════════════════════════════════════════════════════════════
    function FileUploadBox({ tipo, files, onFilesChange }) {
      const isPDF   = tipo === 'pdf';
      const ext     = isPDF ? '.pdf' : '.xml';
      const inputRef = useRef();
      const [error, setError] = useState('');

      const handleSelect = () => {
        setError('');
        inputRef.current.value = '';   // reset so same file can be re-selected
        inputRef.current.click();
      };

      const addFiles = (fileList) => {
        setError('');
        const incoming = Array.from(fileList);
        const valid = [];
        const bad   = [];
        for (const f of incoming) {
          const name = f.name.toLowerCase();
          if (isPDF ? !name.endsWith('.pdf') : !name.endsWith('.xml')) {
            bad.push(`"${f.name}" não é um arquivo ${ext.toUpperCase()}`);
            continue;
          }
          if (f.size > 20 * 1024 * 1024) {
            bad.push(`"${f.name}" excede 20 MB`);
            continue;
          }
          valid.push(f);
        }
        if (bad.length > 0) setError(bad.join(' · '));
        if (valid.length > 0) onFilesChange([...files, ...valid]);
      };

      const removeFile = (idx) => onFilesChange(files.filter((_, i) => i !== idx));

      const color   = isPDF ? C.amber : C.blue;
      const icon    = isPDF ? '📕' : '📎';
      const label   = isPDF ? 'PDF — DANFE / NFS-e' : 'XML — NF-e / NFS-e';
      const subtext = isPDF ? 'Campos extraídos por IA (Claude)' : 'Processamento local, sem envio de dados';

      return (
        <div style={{flex:1,minWidth:260}}>
          {/* Header label */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <span style={{fontSize:18}}>{icon}</span>
            <div>
              <div style={{color:C.text,fontWeight:600,fontSize:14}}>{label}</div>
              <div style={{color:C.text2,fontSize:11}}>{subtext}</div>
            </div>
            <Badge color={isPDF?'amber':'blue'}>{ext.toUpperCase()}</Badge>
          </div>

          {/* Button */}
          <button
            onClick={handleSelect}
            style={{width:'100%',padding:'12px',borderRadius:8,border:`2px dashed ${color}40`,
              background:C.surface,cursor:'pointer',color,fontSize:13,fontWeight:600,
              fontFamily:'IBM Plex Mono,monospace',transition:'all 0.2s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=color}
            onMouseLeave={e=>e.currentTarget.style.borderColor=`${color}40`}
          >
            + Selecionar {isPDF?'PDFs':'XMLs'}
          </button>
          <input
            ref={inputRef}
            type="file"
            accept={ext}
            multiple
            style={{display:'none'}}
            onChange={e => { addFiles(e.target.files); e.target.value=''; }}
          />

          {/* Error */}
          {error && (
            <div style={{marginTop:6,background:'#ef444415',borderRadius:6,padding:'6px 10px',color:C.red,fontSize:11}}>
              ⚠ {error}
            </div>
          )}

          {/* File list */}
          {files.length > 0 && (
            <div style={{marginTop:10}}>
              {files.map((f, i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',
                  background:C.surface2,borderRadius:7,marginBottom:5}}>
                  <span style={{fontSize:12}}>{icon}</span>
                  <span style={{flex:1,color:C.text,fontSize:12,fontFamily:'IBM Plex Mono,monospace',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                  <span style={{color:C.text2,fontSize:11,flexShrink:0}}>
                    {f.size > 1024*1024 ? `${(f.size/1024/1024).toFixed(1)} MB` : `${(f.size/1024).toFixed(0)} KB`}
                  </span>
                  <button onClick={()=>removeFile(i)}
                    style={{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:16,padding:'0 2px',flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function TabItens({ itens, calc }) {
      return (
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{borderBottom:`1px solid ${C.surface2}`}}>
              {['Nº','Descrição','NCM/NBS','Valor','ICMS','PIS/COF','IBS calc.','CBS calc.','IS','Δ%'].map(h => (
                <th key={h} style={{padding:'8px 10px',color:C.text2,fontFamily:'IBM Plex Mono,monospace',fontWeight:500,whiteSpace:'nowrap',textAlign:h==='Descrição'||h==='NCM/NBS'?'left':'right'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {itens.map((item, i) => {
                const c = calc[i];
                const atual = (item.tributos_declarados.icms.valor||0)+(item.tributos_declarados.pis.valor||0)+(item.tributos_declarados.cofins.valor||0)+(item.tributos_declarados.iss.valor||0);
                const delta = c ? ((c.total_novo-atual)/(atual||1))*100 : null;
                return (
                  <tr key={i} style={{borderBottom:`1px solid ${C.surface2}20`}}>
                    <td style={{padding:'8px 10px',color:C.text2,fontFamily:'IBM Plex Mono,monospace'}}>{item.numero}</td>
                    <td style={{padding:'8px 10px',color:C.text,maxWidth:180}}>{item.descricao}</td>
                    <td style={{padding:'8px 10px',color:C.text2,fontFamily:'IBM Plex Mono,monospace'}}>{item.ncm||item.nbs||'—'}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:C.text,fontFamily:'IBM Plex Mono,monospace'}}>{BRL(item.valor_total)}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:C.text2,fontFamily:'IBM Plex Mono,monospace'}}>{BRL(item.tributos_declarados.icms.valor)}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:C.text2,fontFamily:'IBM Plex Mono,monospace'}}>{BRL((item.tributos_declarados.pis.valor||0)+(item.tributos_declarados.cofins.valor||0))}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:C.green,fontFamily:'IBM Plex Mono,monospace'}}>{c?BRL(c.ibs_total):'—'}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:C.green,fontFamily:'IBM Plex Mono,monospace'}}>{c?BRL(c.cbs):'—'}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',color:c&&c.is>0?C.amber:C.text2,fontFamily:'IBM Plex Mono,monospace'}}>{c?BRL(c.is):'—'}</td>
                    <td style={{padding:'8px 10px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:delta===null?C.text2:delta<0?C.green:delta>0?C.red:C.text2}}>{delta!==null?PCT(delta):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

      return (

                <div key={l} style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{color:C.text2,fontSize:12}}>{l}</span><span style={{color:C.text,fontFamily:'IBM Plex Mono,monospace',fontSize:12}}>{BRL(v)}</span></div>

      const totNovo    = resultados.reduce((s,r)=>s+r.comparativo.novo,0);

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:20}}>
            {[['Valor total',BRL(totNota),C.text],['Carga atual',BRL(totAtual),C.amber],['Carga nova',BRL(totNovo),C.green],['Variação',`${delta<0?'↓':'↑'} ${BRL(Math.abs(delta))}`,delta<0?C.green:C.red],['Créditos',BRL(totCredito),C.green],['Split retido',BRL(totSplit),C.red]].map(([l,v,color])=>(

    function StepBar({ step }) {

                <div style={{width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,

    function buildReportHTML_UNUSED(resultados, analiseIA, userEmail) {
      const now = new Date().toLocaleString('pt-BR');
      const fmtBRL = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      const fmtPct = v => v != null ? (v>0?'+':'')+v.toFixed(1)+'%' : '—';

      const rows = resultados.flatMap(r =>
        r.nota.itens.map(item => {
          const c = r.calc[r.nota.itens.indexOf(item)] || {};
          return `<tr>
            <td>${r.nota.emitente?.nome||'—'}</td>
            <td>${r.nota.tipo||'—'}</td>
            <td>${item.descricao||'—'}</td>
            <td>${item.ncm||item.nbs||'—'}</td>
            <td style="text-align:right">${fmtBRL(item.valor_total)}</td>
            <td style="text-align:right">${fmtBRL(c.cbs)}</td>
            <td style="text-align:right">${fmtBRL(c.ibs_total)}</td>
            <td style="text-align:right">${fmtBRL(c.is)}</td>
            <td style="text-align:right;font-weight:600">${fmtBRL(c.total_novo)}</td>
          </tr>`;
        })
      ).join('');

      const totais = resultados.reduce((acc,r)=>{
        acc.base   += r.nota.valor_total_nota||0;
        acc.atual  += r.comparativo?.atual||0;
        acc.novo   += r.comparativo?.novo||0;
        acc.cbs    += r.calc?.reduce((s,c)=>s+(c.cbs||0),0)||0;
        acc.ibs    += r.calc?.reduce((s,c)=>s+(c.ibs_total||0),0)||0;
        acc.is     += r.calc?.reduce((s,c)=>s+(c.is||0),0)||0;
        return acc;
      }, {base:0,atual:0,novo:0,cbs:0,ibs:0,is:0});

      return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>

      </style></head><body>

      <h2>Resumo Consolidado</h2>
      <div class="summary-grid">

        <div class="summary-box"><div class="label">Carga Tributária Nova</div>
          <div class="value ${delta>0?'red':'green'}">${fmtBRL(totais.novo)} (${delta>0?'+':''}${deltaPct}%)</div></div>
        <div class="summary-box"><div class="label">Total CBS</div><div class="value">${fmtBRL(totais.cbs)}</div></div>

    function gerarPDFBytes(resultados, analiseIA, userEmail) {
      const { jsPDF } = window.jspdf;
      const doc  = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
      const W    = doc.internal.pageSize.getWidth();
      const now  = new Date().toLocaleString('pt-BR');
      const B    = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      const P    = v => v != null ? (v>0?'+':'')+Number(v).toFixed(1)+'%' : '—';
      const GREEN  = [0, 200, 150];
      const DARK   = [26, 29, 39];
      const GRAY   = [75, 85, 99];
      const RED    = [220, 38, 38];
      const AMBER  = [217, 119, 6];
      let y = 0;

      const addPage = () => { doc.addPage(); y = 15; };
      const checkY  = (need=20) => { if (y + need > 278) addPage(); };

      const sectionTitle = (title) => {
        checkY(12);
        doc.setFillColor(245,247,250);
        doc.rect(10, y-4, W-20, 8, 'F');
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...DARK);
        doc.text(title, 12, y); y += 6;
      };

      // ══ COVER HEADER ═══════════════════════════════════════════════════════
      doc.setFillColor(...GREEN);
      doc.rect(0, 0, W, 24, 'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(15); doc.setFont('helvetica','bold');
      doc.text('Relatorio de Analise Tributaria', 12, 11);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.text('Reforma Tributaria LC 214/2025  |  NT 2025.002 v1.40', 12, 18);
      doc.setFontSize(8);
      doc.text(`Gerado: ${now}   Usuario: ${userEmail}   ${resultados.length} nota(s) analisada(s)`, 12, 22.5);
      y = 32;

      // ══ CONSOLIDATED SUMMARY ════════════════════════════════════════════════
      const tot = resultados.reduce((a,r) => ({
        base:      a.base   + (r.nota.valor_total_nota||0),
        atual:     a.atual  + (r.comparativo?.atual||0),
        novo:      a.novo   + (r.comparativo?.novo||0),
        cbs:       a.cbs    + (r.totais?.cbs||0),
        ibs:       a.ibs    + (r.totais?.ibs||0),
        is_:       a.is_    + (r.totais?.is||0),
        cred_cbs:  a.cred_cbs + (r.totais?.credito_cbs||0),
        cred_ibs:  a.cred_ibs + (r.totais?.credito_ibs||0),
        split_ret: a.split_ret + (r.split?.valor_retido||0),
        split_liq: a.split_liq + (r.split?.valor_liquido||0),
        icms:      a.icms   + (r.tributos_dec_totais?.icms?.valor||0),
        pis:       a.pis    + (r.tributos_dec_totais?.pis?.valor||0),
        cofins:    a.cofins + (r.tributos_dec_totais?.cofins?.valor||0),
        ipi:       a.ipi    + (r.tributos_dec_totais?.ipi?.valor||0),
        iss:       a.iss    + (r.tributos_dec_totais?.iss?.valor||0),
      }), {base:0,atual:0,novo:0,cbs:0,ibs:0,is_:0,cred_cbs:0,cred_ibs:0,split_ret:0,split_liq:0,icms:0,pis:0,cofins:0,ipi:0,iss:0});
      const totDelta    = tot.novo - tot.atual;
      const totDeltaPct = tot.atual>0 ? (totDelta/tot.atual*100) : null;
      const splitPct    = tot.base>0 ? ((tot.split_ret/tot.base)*100).toFixed(1) : '0';

      sectionTitle(`RESUMO CONSOLIDADO — ${resultados.length} NOTA(S)`);
      doc.autoTable({
        startY: y,
        head: [['Valor Total','Carga Atual','Carga Nova (LC 214)','Variacao','ICMS+PIS+COFINS+ISS atual','CBS novo','IBS novo','IS novo']],
        body: [[
          B(tot.base), B(tot.atual), B(tot.novo),
          P(totDeltaPct),
          `${B(tot.icms+tot.pis+tot.cofins+tot.iss+tot.ipi)}`,
          B(tot.cbs), B(tot.ibs), B(tot.is_),
        ]],
        styles: { fontSize:7.5, cellPadding:3 },
        headStyles: { fillColor:GREEN, textColor:[255,255,255], fontStyle:'bold', fontSize:7 },
        bodyStyles: { textColor:DARK },
        columnStyles: { 3: { textColor: totDelta>0?RED:[5,150,105], fontStyle:'bold' } },
        margin: { left:12, right:12 },
      });
      y = doc.lastAutoTable.finalY + 4;

      // Split payment summary
      doc.autoTable({
        startY: y,
        head: [['Split Payment (a partir de 2027)','Valor retido','Valor liquido recebido','% retido','Credito CBS','Credito IBS','Total creditos']],
        body: [[
          'Retencao automatica IBS+CBS no pagamento',
          B(tot.split_ret), B(tot.split_liq), `${splitPct}%`,
          B(tot.cred_cbs), B(tot.cred_ibs), B(tot.cred_cbs+tot.cred_ibs),
        ]],
        styles: { fontSize:7.5, cellPadding:3 },
        headStyles: { fillColor:[55,65,81], textColor:[255,255,255], fontSize:7 },
        bodyStyles: { textColor:DARK },
        margin: { left:12, right:12 },
      });
      y = doc.lastAutoTable.finalY + 8;

      // ══ AI ANALYSIS ════════════════════════════════════════════════════════
      if (analiseIA?.resumo_executivo) {
        sectionTitle('ANALISE DA IA — RESUMO EXECUTIVO');
        doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...DARK);
        const lines = doc.splitTextToSize(analiseIA.resumo_executivo, W-24);
        checkY(lines.length*4+6);
        doc.setFillColor(240,253,250);
        doc.roundedRect(10, y-2, W-20, lines.length*4+4, 2, 2, 'F');
        doc.text(lines, 12, y+1); y += lines.length*4+8;
      }

      if (analiseIA?.recomendacoes?.length) {
        sectionTitle('RECOMENDACOES');
        analiseIA.recomendacoes.forEach(r => {
          const color = r.prioridade==='alta'?RED:r.prioridade==='media'?AMBER:[5,150,105];
          checkY(10);
          doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...color);
          doc.text(r.prioridade.toUpperCase(), 12, y);
          doc.setFont('helvetica','normal'); doc.setTextColor(...DARK);
          const lines = doc.splitTextToSize(r.texto, W-36);
          doc.text(lines, 30, y); y += Math.max(lines.length*4, 5)+2;
        });
        y += 4;
      }

      // ══ PER-NOTA DETAIL ════════════════════════════════════════════════════
      resultados.forEach((r, ri) => {
        const { nota, itens_calc, comparativo, split, totais, tributos_dec_totais, alertas } = r;
        const maxV = Math.max(comparativo.atual, comparativo.novo, 1);

        checkY(50);
        // Nota header bar
        doc.setFillColor(...GREEN);
        doc.rect(10, y-4, W-20, 9, 'F');
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
        doc.text(`NOTA ${ri+1}: ${nota.emitente.nome||'—'}  |  ${nota.tipo||''}  |  ${nota.data_emissao||''}`, 12, y+1);
        y += 8;

        // Emitente info row
        doc.autoTable({
          startY: y,
          body: [[
            nota.emitente.cnpj||'—',
            nota.emitente.regime||'—',
            nota.emitente.porte||'—',
            nota.emitente.cnae_codigo ? `${nota.emitente.cnae_codigo} ${nota.emitente.cnae_descricao||''}`.substring(0,45) : '—',
            nota.emitente.situacao_rf||'—',
            nota.arquivo_original||'—',
          ]],
          head: [['CNPJ','Regime','Porte','CNAE','Situacao RF','Arquivo']],
          styles: { fontSize:7, cellPadding:2 },
          headStyles: { fillColor:[55,65,81], textColor:[255,255,255], fontSize:6.5 },
          margin: { left:12, right:12 },
        });
        y = doc.lastAutoTable.finalY + 5;

        // ── Comparison: Atual vs Novo ─────────────────────────────────────
        checkY(40);
        sectionTitle('COMPARATIVO TRIBUTARIO: SISTEMA ATUAL x SISTEMA NOVO');
        doc.autoTable({
          startY: y,
          head: [['Tributo','Sistema Atual','','Tributo','Sistema Novo (LC 214)']],
          body: [
            ['ICMS', B(tributos_dec_totais?.icms?.valor||0), '', 'CBS', B(totais?.cbs||0)],
            ['PIS',  B(tributos_dec_totais?.pis?.valor||0),  '', 'IBS', B(totais?.ibs||0)],
            ['COFINS',B(tributos_dec_totais?.cofins?.valor||0),'','IS', B(totais?.is||0)],
            ['ISS',  B(tributos_dec_totais?.iss?.valor||0),  '', '', ''],
            ['IPI',  B(tributos_dec_totais?.ipi?.valor||0),  '', '', ''],
            [{content:'TOTAL', styles:{fontStyle:'bold'}}, {content:B(comparativo.atual), styles:{fontStyle:'bold'}}, '',
             {content:'TOTAL', styles:{fontStyle:'bold'}}, {content:B(comparativo.novo), styles:{fontStyle:'bold'}}],
            [{content:`${comparativo.atual_pct}% do valor da nota`, colSpan:2, styles:{textColor:GRAY, fontSize:7}}, '',
             {content:`${comparativo.novo_pct}% do valor da nota`, colSpan:2, styles:{textColor:GRAY, fontSize:7}}, ''],
          ],
          styles: { fontSize:8, cellPadding:3 },
          headStyles: { fillColor:[75,85,99], textColor:[255,255,255], fontSize:7 },
          columnStyles: {
            1: { halign:'right', fontFamily:'courier' },
            4: { halign:'right', fontFamily:'courier', textColor:[5,150,105] },
          },
          margin: { left:12, right:12 },
        });
        y = doc.lastAutoTable.finalY + 3;

        // Variation box
        checkY(14);
        const varColor = comparativo.tendencia==='reducao'?GREEN:comparativo.tendencia==='aumento'?RED:GRAY;
        const varLabel = comparativo.tendencia==='reducao'?'REDUCAO DE CARGA':comparativo.tendencia==='aumento'?'AUMENTO DE CARGA':'SEM VARIACAO';
        doc.setFillColor(varColor[0], varColor[1], varColor[2], 0.1);
        doc.setDrawColor(...varColor);
        doc.roundedRect(12, y, W-24, 10, 2, 2, 'FD');
        doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(...varColor);
        const varArrow = comparativo.tendencia==='reducao'?'↓':comparativo.tendencia==='aumento'?'↑':'→';
        doc.text(`${varArrow}  ${B(Math.abs(comparativo.delta))}  (${P(comparativo.delta_pct)})  —  ${varLabel}`, W/2, y+6.5, {align:'center'});
        y += 14;

        // ── Split Payment ─────────────────────────────────────────────────
        checkY(30);
        sectionTitle('SPLIT PAYMENT — RETENCAO AUTOMATICA (a partir de 2027)');
        doc.autoTable({
          startY: y,
          head: [['Valor Total da Nota','Valor Retido (IBS+CBS)','Valor Liquido Recebido','Percentual Retido']],
          body: [[
            {content:B(nota.valor_total_nota), styles:{textColor:DARK}},
            {content:B(split.valor_retido),    styles:{textColor:RED,   fontStyle:'bold'}},
            {content:B(split.valor_liquido),   styles:{textColor:[5,150,105], fontStyle:'bold'}},
            {content:`${split.percentual}%`,   styles:{textColor:AMBER, fontStyle:'bold'}},
          ]],
          styles: { fontSize:9, cellPadding:4, halign:'center' },
          headStyles: { fillColor:[55,65,81], textColor:[255,255,255], fontSize:7, halign:'center' },
          margin: { left:12, right:12 },
        });
        y = doc.lastAutoTable.finalY + 4;

        // Split bar
        const retW = Math.max(((split.percentual||0)/100)*(W-24), 0);
        doc.setFillColor(...RED);   doc.rect(12, y, retW, 5, 'F');
        doc.setFillColor(5,150,105); doc.rect(12+retW, y, (W-24)-retW, 5, 'F');
        doc.setFontSize(6.5); doc.setFont('helvetica','normal');
        doc.setTextColor(255,255,255);
        if (retW > 10) doc.text(`${split.percentual}% retido`, 14, y+3.5);
        if ((W-24)-retW > 15) doc.text(`${(100-split.percentual).toFixed(1)}% recebido`, 12+retW+2, y+3.5);
        y += 9;

        // ── Credits ───────────────────────────────────────────────────────
        checkY(20);
        sectionTitle('CREDITOS IBS/CBS GERADOS');
        doc.autoTable({
          startY: y,
          head: [['Credito CBS','Credito IBS','Total de Creditos','Observacao']],
          body: [[
            {content:B(totais?.credito_cbs||0), styles:{textColor:[5,150,105],fontStyle:'bold'}},
            {content:B(totais?.credito_ibs||0), styles:{textColor:[5,150,105],fontStyle:'bold'}},
            {content:B((totais?.credito_cbs||0)+(totais?.credito_ibs||0)), styles:{textColor:[5,150,105],fontStyle:'bold'}},
            'Valido para destinatarios contribuintes PJ fora do Simples',
          ]],
          styles: { fontSize:8, cellPadding:3 },
          headStyles: { fillColor:[55,65,81], textColor:[255,255,255], fontSize:7 },
          margin: { left:12, right:12 },
        });
        y = doc.lastAutoTable.finalY + 4;

        // ── Items detail ──────────────────────────────────────────────────
        checkY(20);
        sectionTitle('DETALHAMENTO POR ITEM');
        const itemRows = nota.itens.map((item,i) => {
          const c = itens_calc?.[i] || {};
          const fatorLabel = c.fator===0?'Cesta Basica (0%)':c.fator<1?`Reducao ${Math.round((1-c.fator)*100)}%`:'Aliquota Plena';
          return [
            item.numero, (item.descricao||'—').substring(0,35),
            item.ncm||item.nbs||'—', c.setor||'Geral',
            fatorLabel, B(item.valor_total),
            B(c.cbs||0), B(c.ibs_total||0), B(c.is||0),
            {content:B(c.total_novo||0), styles:{fontStyle:'bold', textColor:[5,150,105]}},
          ];
        });
        doc.autoTable({
          startY: y,
          head: [['#','Descricao','NCM/NBS','Setor','Tratamento','Valor Base','CBS','IBS','IS','Total Novo']],
          body: itemRows,
          styles: { fontSize:6.5, cellPadding:2 },
          headStyles: { fillColor:GREEN, textColor:[255,255,255], fontSize:6 },
          alternateRowStyles: { fillColor:[249,250,251] },
          columnStyles: { 5:{halign:'right'}, 6:{halign:'right'}, 7:{halign:'right'}, 8:{halign:'right'}, 9:{halign:'right'} },
          margin: { left:12, right:12 },
        });
        y = doc.lastAutoTable.finalY + 10;
      });

      // ══ FOOTER ON ALL PAGES ════════════════════════════════════════════════
      const totalPages = doc.internal.getNumberOfPages();
      for (let i=1; i<=totalPages; i++) {
        doc.setPage(i);
        doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(150,150,150);
        doc.text('Validador Tributario NF-e/NFS-e  ·  LC 214/2025  ·  NT 2025.002 v1.40  ·  Nao substitui assessoria tributaria especializada',
          W/2, 291, { align:'center' });
        doc.text(`Pagina ${i} de ${totalPages}`, W-12, 291, { align:'right' });
      }

      return doc.output('arraybuffer');
    }

    async function gerarEEnviarPDF(resultados, analiseIA, userEmail, apiEndpoint, setStatus) {
      try {
        setStatus('gerando');
        const pdfBuffer = gerarPDFBytes(resultados, analiseIA, userEmail);

        // Convert ArrayBuffer to base64
        const bytes = new Uint8Array(pdfBuffer);
        let binary = '';
        for (let i=0; i<bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
        const base64 = btoa(binary);

        setStatus('enviando');
        const reportUrl = apiEndpoint.replace('/analyze', '/report');
        const res = await apiFetch(reportUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, pdf_base64: base64, filename: 'relatorio-tributario.pdf' }),
        });
        if (!res.ok) {
          const d = await res.json().catch(()=>({}));
          throw new Error(d.error || `HTTP ${res.status}`);
        }
        setStatus('enviado');
      } catch(e) {
        setStatus('erro:' + e.message);
      }
    }

      });

      const [taxDataReady, setTaxDataReady] = useState(false);

      // ── Auth init ────────────────────────────────────────────────────────
      useEffect(() => {
        if (!AUTH_ENABLED) return;
        (async () => {
          // Check for authorization code returned by Cognito Hosted UI
          const params = new URLSearchParams(window.location.search);
          const code = params.get('code');
          if (code) {
            window.history.replaceState({}, '', window.location.pathname);
            const tokens = await authExchangeCode(code);
            if (tokens.id_token) { authStore(tokens); setAuthUser(authParseJwt(tokens.id_token)); setAuthLoading(false); return; }
          }
          // Existing valid token
          if (authIsValid(authGetToken())) { setAuthUser(authGetUser()); setAuthLoading(false); return; }
          // Try refresh
          if (await authRefreshTokens()) { setAuthUser(authGetUser()); setAuthLoading(false); return; }
          // Not authenticated
          setAuthLoading(false);
        })();
      }, []);

      // Load external tax data tables from S3
      useEffect(() => {
        loadTaxData().then(() => setTaxDataReady(TAX_DATA.loaded));
      }, []);

      // Prevent browser from navigating to a dropped PDF anywhere on the page
      useEffect(() => {
        const block = e => { e.preventDefault(); e.stopPropagation(); };
        document.addEventListener('dragover', block);
        document.addEventListener('drop',     block);
        return () => { document.removeEventListener('dragover', block); document.removeEventListener('drop', block); };
      }, []);


      const apiOk = apiEndpoint && apiEndpoint !== 'REPLACE_API_ENDPOINT' && apiEndpoint.startsWith('http');

      // ── STEP 1: Extract / Parse ─────────────────────────────────────────────
      const handleExtract = async () => {
        setLoadingExtract(true);
        setExtractErrors([]);
        setExtractedNotas([]);
        setResultados([]);
        setAnaliseIA(null);

        const arquivos = [...xmlFiles, ...pdfFiles];
        const results = await Promise.all(arquivos.map(async file => {
          try {
            if (file.name.toLowerCase().endsWith('.pdf')) {
              if (!apiOk) throw new Error('Configure o endpoint da API para processar PDFs');
              const b64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload  = () => resolve(reader.result.split(',')[1]);
                reader.onerror = () => reject(new Error('Falha ao ler o arquivo PDF'));
                reader.readAsDataURL(file);
              });
              let nota = await extractPDF(b64, file.name, apiEndpoint);
              if (!nota) throw new Error('A IA não retornou dados do documento');
              nota._source = 'pdf';
              nota = await enriquecerNota(nota);
              return { ok:true, nota };
            } else {
              const text = await file.text();
              let nota = parseXML(text, file.name);
              nota = await enriquecerNota(nota);
              return { ok:true, nota };
            }
          } catch(e) {
            return { ok:false, arquivo:file.name, erro:e.message };
          }
        }));

        const ok  = results.filter(r=>r.ok).map(r=>r.nota);
        const err = results.filter(r=>!r.ok);
        setExtractErrors(err);
        setExtractedNotas(ok);
        setLoadingExtract(false);
        // Always advance so errors are visible; extracted step handles the empty-ok case
        setStep('extracted');
      };

      // ── STEP 2: Tax Analysis ────────────────────────────────────────────────
      const handleAnalyze = async () => {
        setLoadingAnalyze(true);
        const res = extractedNotas.map(processarNota);
        setResultados(res);
        setStep('analyzed');
        setLoadingAnalyze(false);

        if (res.length > 0 && apiOk) {
          setLoadingIA(true);
          try { setAnaliseIA(await chamarClaudeAPI(res, apiEndpoint)); } catch(e) { console.warn('Claude API:', e.message); }
          setLoadingIA(false);
        }
      };

      const resetToUpload = () => { setStep('upload'); setXmlFiles([]); setPdfFiles([]); setExtractedNotas([]); setResultados([]); setAnaliseIA(null); setExtractErrors([]); };
      const totalFiles = xmlFiles.length + pdfFiles.length;

      // Auth gating
      if (authLoading) return (
        <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',color:C.text2,fontSize:14}}>
          Autenticando…
        </div>
      );
      if (AUTH_ENABLED && !authUser) return <LoginScreen />;

      return (
        <div style={{maxWidth:980,margin:'0 auto',padding:'24px 16px'}}>
          {/* Header */}
          <div className="no-print" style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',marginBottom:24}}>
            <div>
              <h1 style={{fontSize:22,fontWeight:700,color:C.text,letterSpacing:'-0.02em'}}>Validador Tributário NF-e / NFS-e</h1>
              <p style={{color:C.text2,fontSize:13,marginTop:4}}>Reforma Tributária 2026 — LC 214/2025</p>
            </div>
            <div style={{display:'flex',gap:8,marginLeft:'auto',alignItems:'center'}}>
              <Badge color="green">IBS</Badge><Badge color="green">CBS</Badge><Badge color="amber">IS</Badge><Badge color="blue">2026</Badge>
              {AUTH_ENABLED && authUser && (
                <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8,borderLeft:`1px solid ${C.surface2}`,paddingLeft:12}}>
                  <span style={{fontSize:12,color:C.text2}}>{authUser.email}</span>
                  <button onClick={() => { authClear(); window.location.href = authLogoutUrl(); }}
                    style={{fontSize:11,padding:'3px 8px',background:'transparent',border:`1px solid ${C.surface3}`,
                            color:C.text2,borderRadius:4,cursor:'pointer'}}>
                    Sair
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* Step bar */}
          <StepBar step={step} />

          {/* Settings */}
          <div className="no-print" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <SettingsPanel endpoint={apiEndpoint} setEndpoint={setApiEndpoint} />
            <div style={{fontSize:12,padding:'4px 10px',borderRadius:6,border:`1px solid ${taxDataReady ? C.green : C.amber}`,color: taxDataReady ? C.green : C.amber}}>
              {taxDataReady ? '✓ Tabelas LC 214/2025 carregadas' : '⟳ Carregando tabelas tributárias…'}
            </div>
          </div>

          {/* ── STEP: UPLOAD ── */}
          {step === 'upload' && (
            <div className="no-print">
              {/* Two upload boxes side by side */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
                <div style={{background:C.surface,borderRadius:12,padding:16,border:`1px solid ${C.surface2}`}}>
                  <FileUploadBox tipo="xml" files={xmlFiles} onFilesChange={setXmlFiles} />
                </div>
                <div style={{background:C.surface,borderRadius:12,padding:16,border:`1px solid ${C.surface2}`}}>
                  <FileUploadBox tipo="pdf" files={pdfFiles} onFilesChange={setPdfFiles} />
                </div>
              </div>

              {/* Process button */}
              <button onClick={handleExtract} disabled={totalFiles===0||loadingExtract}
                style={{width:'100%',padding:'13px',borderRadius:8,border:'none',
                  cursor:totalFiles===0||loadingExtract?'not-allowed':'pointer',
                  background:totalFiles===0||loadingExtract?C.surface2:C.green,
                  color:totalFiles===0||loadingExtract?C.text2:'#0f1117',
                  fontSize:15,fontWeight:700,transition:'all 0.2s'}}>
                {loadingExtract
                  ? '⟳ Extraindo campos...'
                  : totalFiles===0
                    ? 'Selecione arquivos XML ou PDF acima'
                    : `Processar Arquivos (${totalFiles}${xmlFiles.length>0&&pdfFiles.length>0?` · ${xmlFiles.length} XML + ${pdfFiles.length} PDF`:''})`
                }
              </button>
            </div>
          )}

          {/* ── STEP: EXTRACTED FIELDS ── */}
          {step === 'extracted' && (
            <div>
              {/* Always-visible error panel */}
              {extractErrors.length > 0 && (
                <div style={{background:'#ef444415',border:`1px solid ${C.red}`,borderRadius:8,padding:14,marginBottom:16}}>
                  <div style={{color:C.red,fontWeight:600,fontSize:13,marginBottom:8}}>
                    ⚠ {extractErrors.length} arquivo{extractErrors.length>1?'s':''} com erro
                  </div>
                  {extractErrors.map((e,i) => (
                    <div key={i} style={{color:C.red,fontSize:12,marginBottom:4,fontFamily:'IBM Plex Mono,monospace'}}>
                      {e.arquivo}: {e.erro}
                    </div>
                  ))}
                </div>
              )}

              {extractedNotas.length === 0 ? (
                /* All files failed — just show "go back" */
                <div style={{textAlign:'center',padding:'32px 0'}}>
                  <div style={{color:C.text2,fontSize:14,marginBottom:16}}>Nenhum documento foi processado com sucesso.</div>
                  <button onClick={resetToUpload}
                    style={{padding:'10px 28px',borderRadius:8,border:`1px solid ${C.surface2}`,background:'transparent',color:C.text,cursor:'pointer',fontSize:14}}>
                    ← Voltar e tentar novamente
                  </button>
                </div>
              ) : (
                <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
                    <div>
                      <h2 style={{color:C.text,fontSize:16,fontWeight:600}}>Campos Extraídos</h2>
                      <p style={{color:C.text2,fontSize:12,marginTop:2}}>{extractedNotas.length} documento{extractedNotas.length!==1?'s':''} — verifique os campos antes de analisar</p>
                    </div>
                    <div style={{display:'flex',gap:10}}>
                      <button onClick={resetToUpload} style={{padding:'8px 16px',borderRadius:6,border:`1px solid ${C.surface2}`,background:'transparent',color:C.text2,cursor:'pointer',fontSize:13}}>← Voltar</button>
                      <button onClick={handleAnalyze} disabled={loadingAnalyze}
                        style={{padding:'8px 20px',borderRadius:6,border:'none',background:C.green,color:'#0f1117',cursor:loadingAnalyze?'not-allowed':'pointer',fontSize:13,fontWeight:700}}>
                        {loadingAnalyze ? '⟳ Analisando...' : 'Analisar Tributação →'}
                      </button>
                    </div>
                  </div>

                  {extractedNotas.map((nota, i) => <ExtractedFieldsCard key={i} nota={nota} index={i} />)}

                  <div style={{textAlign:'center',marginTop:16}}>
                    <button onClick={handleAnalyze} disabled={loadingAnalyze}
                      style={{padding:'12px 40px',borderRadius:8,border:'none',background:C.green,color:'#0f1117',cursor:loadingAnalyze?'not-allowed':'pointer',fontSize:15,fontWeight:700}}>
                      {loadingAnalyze ? '⟳ Calculando tributos...' : 'Analisar Tributação →'}
                    </button>
                  </div>
                </>
              )}
            </div>
          )}

          {/* ── STEP: TAX ANALYSIS RESULTS ── */}
          {step === 'analyzed' && (
            <div className="print-area">
              <div className="no-print" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
                <div>
                  <h2 style={{color:C.text,fontSize:16,fontWeight:600}}>Análise Tributária</h2>
                  <p style={{color:C.text2,fontSize:12,marginTop:2}}>{resultados.length} nota{resultados.length!==1?'s':''} processada{resultados.length!==1?'s':''}</p>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>setStep('extracted')} style={{padding:'8px 14px',borderRadius:6,border:`1px solid ${C.surface2}`,background:'transparent',color:C.text2,cursor:'pointer',fontSize:13}}>← Campos extraídos</button>
                  <button onClick={resetToUpload} style={{padding:'8px 14px',borderRadius:6,border:`1px solid ${C.surface2}`,background:'transparent',color:C.text2,cursor:'pointer',fontSize:13}}>Nova análise</button>
                </div>
              </div>

              {resultados.length >= 2 && <LoteSummary resultados={resultados} analiseIA={analiseIA} loadingIA={loadingIA} />}
              {resultados.map((r,i) => <ResultCard key={i} resultado={r} analiseIA={analiseIA} defaultOpen={resultados.length===1} />)}

              <div className="no-print" style={{display:'flex',gap:10,marginTop:14,flexWrap:'wrap'}}>
                <button onClick={()=>exportCSV(resultados)} style={{flex:1,padding:'12px',borderRadius:8,border:`1px solid ${C.green}`,background:'transparent',color:C.green,cursor:'pointer',fontSize:14,fontWeight:600}}>↓ Exportar CSV</button>
                <button onClick={()=>window.print()} style={{flex:1,padding:'12px',borderRadius:8,border:`1px solid ${C.text2}`,background:'transparent',color:C.text2,cursor:'pointer',fontSize:14,fontWeight:600}}>🖨 Imprimir / PDF</button>
                <button
                  disabled={reportStatus==='gerando'||reportStatus==='enviando'}
                  onClick={()=>{ setReportStatus('idle'); gerarEEnviarPDF(resultados, analiseIA, authUser?.email || '', apiEndpoint, setReportStatus); }}
                  style={{flex:1,padding:'12px',borderRadius:8,
                    border:`1px solid ${reportStatus==='enviado'?C.green:reportStatus.startsWith('erro')?C.red:C.blue}`,
                    background:'transparent',
                    color: reportStatus==='enviado'?C.green:reportStatus.startsWith('erro')?C.red:C.blue,
                    cursor: reportStatus==='gerando'||reportStatus==='enviando'?'wait':'pointer',
                    fontSize:14,fontWeight:600}}>
                  {reportStatus==='gerando'  ? '⟳ Gerando PDF…'  :
                   reportStatus==='enviando' ? '⟳ Enviando…'     :
                   reportStatus==='enviado'  ? '✓ Relatório enviado!' :
                   reportStatus.startsWith('erro') ? '✗ Erro — tentar novamente' :
                   '✉ Enviar Relatório por Email'}
                </button>
              </div>
              {reportStatus.startsWith('erro') && (
                <div style={{marginTop:8,fontSize:12,color:C.red,padding:'8px 12px',background:'#1a0a0a',borderRadius:6}}>
                  {reportStatus.replace('erro:','')}
                </div>
              )}
            </div>
          )}

          <div style={{marginTop:40,textAlign:'center',color:C.text2,fontSize:11,fontFamily:'IBM Plex Mono,monospace',lineHeight:1.6}}>
            Base: LC 214/2025 · NT 2025.002 v1.40 · Alíquotas de referência<br/>
            Não substitui assessoria tributária especializada
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
