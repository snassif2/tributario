AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Validador Tributario NF-e/NFS-e — Reforma Tributaria LC 214/2025

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API Key for Claude access

Globals:
  Function:
    Timeout: 60
    Runtime: python3.11
    Architectures:
      - x86_64

Resources:

  # ── Lambda: Claude API Proxy ──────────────────────────────────────────────
  ClaudeProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tributario-claude-proxy
      CodeUri: backend/claude_proxy/
      Handler: app.lambda_handler
      Description: Proxy for Anthropic Claude API — keeps API key server-side
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        PostAnalyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref TributarioApi
            Path: /analyze
            Method: POST
        OptionsAnalyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref TributarioApi
            Path: /analyze
            Method: OPTIONS
        PostExtract:
          Type: HttpApi
          Properties:
            ApiId: !Ref TributarioApi
            Path: /extract
            Method: POST
        OptionsExtract:
          Type: HttpApi
          Properties:
            ApiId: !Ref TributarioApi
            Path: /extract
            Method: OPTIONS

  # ── HTTP API Gateway ──────────────────────────────────────────────────────
  TributarioApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - POST
          - OPTIONS

  # ── S3 Bucket: Frontend Hosting ───────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "tributario-frontend-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ── CloudFront Distribution ───────────────────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !Sub "${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        PriceClass: PriceClass_100
        HttpVersion: http2

Outputs:
  ApiEndpoint:
    Description: Claude Proxy API endpoint
    Value: !Sub "https://${TributarioApi}.execute-api.${AWS::Region}.amazonaws.com/prod/analyze"
    Export:
      Name: TributarioApiEndpoint

  FrontendBucketName:
    Description: S3 bucket name for frontend deployment
    Value: !Ref FrontendBucket
    Export:
      Name: TributarioFrontendBucket

  CloudFrontUrl:
    Description: CloudFront URL for the application
    Value: !Sub "https://${FrontendDistribution.DomainName}"
    Export:
      Name: TributarioCloudFrontUrl
